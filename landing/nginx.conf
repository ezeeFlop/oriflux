server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/xml font/woff2;

    location /healthz {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"status":"ok"}';
    }

    # Hashed, immutable build assets — cache hard.
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Directory-format static site: serve the folder's index.html, fall back to
    # the root index for anything unmatched.
    location / {
        try_files $uri $uri/index.html /index.html;
    }
}
