# Dev environment for the walking skeleton (issue #1).
# Production Swarm stack (spt-oriflux, Traefik/NPM, multi-arch) is issue #2.
name: oriflux-dev

x-service-env: &service-env
  ORIFLUX_REDIS_URL: redis://redis:6379/0
  ORIFLUX_CLICKHOUSE_HOST: clickhouse
  ORIFLUX_CLICKHOUSE_PORT: "8123"
  ORIFLUX_CLICKHOUSE_USER: oriflux
  ORIFLUX_CLICKHOUSE_PASSWORD: oriflux-dev
  ORIFLUX_CLICKHOUSE_DATABASE: oriflux
  ORIFLUX_DATABASE_URL: postgresql+asyncpg://oriflux:oriflux-dev@postgres:5432/oriflux
  ORIFLUX_GEOIP_DIR: /var/lib/oriflux/geoip
  ORIFLUX_GEOIP_PROVIDER: ${ORIFLUX_GEOIP_PROVIDER:-dbip}  # dbip (keyless) | maxmind (needs key)
  ORIFLUX_MAXMIND_LICENSE_KEY: ${MAXMIND_LICENSE_KEY:-}  # only used by the maxmind provider
  # AI layer (optional in dev — empty URL keeps it cleanly disabled)
  ORIFLUX_SPT_MODELS_URL: ${ORIFLUX_SPT_MODELS_URL:-}
  ORIFLUX_SPT_MODELS_API_KEY: ${ORIFLUX_SPT_MODELS_API_KEY:-}
  ORIFLUX_SPT_CHAT_MODEL: ${ORIFLUX_SPT_CHAT_MODEL:-gemma-4-26b-a4b-it}
  ORIFLUX_SPT_EMBED_MODEL: ${ORIFLUX_SPT_EMBED_MODEL:-jina-embeddings-v5-text-small}

x-healthz: &healthz
  test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
  interval: 5s
  timeout: 3s
  retries: 12

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8  # pinned LTS (PRD §8.3)
    environment:
      CLICKHOUSE_DB: oriflux
      CLICKHOUSE_USER: oriflux
      CLICKHOUSE_PASSWORD: oriflux-dev
    ports:
      - "8123:8123"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ulimits:
      nofile: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 24

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: oriflux
      POSTGRES_PASSWORD: oriflux-dev
      POSTGRES_DB: oriflux
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oriflux"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7
    # AOF everysec: ≤ 1 s loss window on Redis crash, accepted per PRD §8.3
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    ports:
      - "6380:6379"  # 6380 on the host: 6379 is commonly taken by a local Redis
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  # api starts first (it runs the alembic migrations); ingest waits for it so
  # key lookups never hit a table-less database in dev.
  api:
    build: ../api
    command: ["uvicorn", "oriflux.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment: *service-env
    ports:
      - "8101:8000"
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck: *healthz

  ingest:
    build: ../api
    command: ["uvicorn", "oriflux.ingest.main:app", "--host", "0.0.0.0", "--port", "8000", "--no-access-log"]
    environment: *service-env
    ports:
      - "8100:8000"
    volumes:
      - geoip-data:/var/lib/oriflux/geoip
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck: *healthz

  workers:
    build: ../api
    command: ["bash", "workers-entrypoint.sh"]  # uvicorn + celery worker --beat (#16)
    environment: *service-env
    ports:
      - "8102:8000"
    volumes:
      - geoip-data:/var/lib/oriflux/geoip
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck: *healthz

  web:
    build: ../web
    environment:
      API_UPSTREAM: api:8000  # compose network: the short name is unambiguous here
    ports:
      - "8103:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/healthz"]
      interval: 5s
      timeout: 3s
      retries: 12

  landing:
    # context = repo root: the docs content collection reads ../docs/public
    build:
      context: ..
      dockerfile: landing/Dockerfile
    ports:
      - "8104:80"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/healthz"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  clickhouse-data:
  postgres-data:
  redis-data:
  geoip-data:
