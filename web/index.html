<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oriflux</title>
    <script>
      // apply the stored theme before first paint (no flash);
      // light is the default (PRD #43: commercial posture) — dark is opt-in
      document.documentElement.classList.toggle(
        "dark",
        localStorage.getItem("oriflux.theme") === "dark",
      );
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
